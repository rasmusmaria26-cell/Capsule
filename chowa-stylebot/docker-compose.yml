version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: chowa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chowa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chowa_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chowa_stylebot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chowa}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chowa_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
